# Local orchestration for the Beckn Data Commons network.
# Build context is the repo root (..); the single root Dockerfile is
# parameterized per service via the SERVICE build arg.
#
# Run from the repo root:  docker compose -f infra/docker-compose.yml up --build
name: beckn-data-commons

x-service-healthcheck: &service-healthcheck
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 15s

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bdc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bdc_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-bdc}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-bdc} -d ${POSTGRES_DB:-bdc}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '${REDIS_PORT:-6379}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  bap:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE: bap
    environment:
      PORT: 3001
    ports:
      - '${BAP_PORT:-3001}:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      <<: *service-healthcheck
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]

  # Three config-driven BPP instances from one image, each serving a different
  # synthetic catalog. ACCESS_MANAGER_PUBLIC_KEY is wired in Phase 4.
  bpp-tabular:
    image: bdc-bpp:local
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE: bpp
    environment:
      PORT: 3002
      BPP_ID: bpp.tabular.local
      BPP_URI: http://localhost:3002
      CATALOG_FILE: /app/seed-data/catalogs/tabular.catalog.json
      DATA_DIR: /app/seed-data/files
      DATABASE_URL: postgresql://${POSTGRES_USER:-bdc}:${POSTGRES_PASSWORD:-bdc_dev_password}@postgres:5432/${POSTGRES_DB:-bdc}
      ACCESS_MANAGER_PUBLIC_KEY: ${ACCESS_MANAGER_PUBLIC_KEY:-}
    ports:
      - '${BPP_TABULAR_PORT:-3002}:3002'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      <<: *service-healthcheck
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3002/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]

  bpp-image:
    image: bdc-bpp:local
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE: bpp
    environment:
      PORT: 3012
      BPP_ID: bpp.vision.local
      BPP_URI: http://localhost:3012
      CATALOG_FILE: /app/seed-data/catalogs/image.catalog.json
      DATA_DIR: /app/seed-data/files
      DATABASE_URL: postgresql://${POSTGRES_USER:-bdc}:${POSTGRES_PASSWORD:-bdc_dev_password}@postgres:5432/${POSTGRES_DB:-bdc}
      ACCESS_MANAGER_PUBLIC_KEY: ${ACCESS_MANAGER_PUBLIC_KEY:-}
    ports:
      - '${BPP_IMAGE_PORT:-3012}:3012'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      <<: *service-healthcheck
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3012/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]

  bpp-models:
    image: bdc-bpp:local
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE: bpp
    environment:
      PORT: 3022
      BPP_ID: bpp.models.local
      BPP_URI: http://localhost:3022
      CATALOG_FILE: /app/seed-data/catalogs/models.catalog.json
      DATA_DIR: /app/seed-data/files
      DATABASE_URL: postgresql://${POSTGRES_USER:-bdc}:${POSTGRES_PASSWORD:-bdc_dev_password}@postgres:5432/${POSTGRES_DB:-bdc}
      ACCESS_MANAGER_PUBLIC_KEY: ${ACCESS_MANAGER_PUBLIC_KEY:-}
    ports:
      - '${BPP_MODELS_PORT:-3022}:3022'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      <<: *service-healthcheck
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3022/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]

  access-manager:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE: access-manager
    environment:
      PORT: 3003
    ports:
      - '${ACCESS_MANAGER_PORT:-3003}:3003'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      <<: *service-healthcheck
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3003/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]

  mcp-server:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE: mcp-server
    environment:
      PORT: 3004
    ports:
      - '${MCP_SERVER_PORT:-3004}:3004'
    healthcheck:
      <<: *service-healthcheck
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3004/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]

volumes:
  postgres-data:
